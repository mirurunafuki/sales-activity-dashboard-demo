<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>営業活動 見える化ダッシュボード デモ</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #20242a;
        --muted: #6c7480;
        --line: #dfe4ea;
        --green: #17835d;
        --blue: #2867b2;
        --amber: #9b6a08;
        --red: #c14337;
        --ink: #1d2939;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .wrap {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 20px 0 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.2;
        letter-spacing: 0;
      }

      .sub {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      button {
        appearance: none;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--ink);
        border-radius: 6px;
        padding: 9px 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button.active {
        background: var(--ink);
        border-color: var(--ink);
        color: #ffffff;
      }

      main {
        padding: 22px 0 40px;
      }

      .notice {
        border: 1px solid #c9d8e8;
        background: #f2f7fc;
        color: #1c4a72;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 14px;
        margin-bottom: 18px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .metric,
      .panel,
      .member {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .metric {
        padding: 16px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 28px;
        line-height: 1.1;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.9fr);
        gap: 16px;
      }

      .panel {
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 17px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 11px 8px;
        text-align: right;
        font-size: 14px;
        white-space: nowrap;
      }

      th:first-child,
      td:first-child {
        text-align: left;
      }

      th {
        color: var(--muted);
        font-size: 12px;
      }

      .member-list {
        display: grid;
        gap: 12px;
      }

      .member {
        padding: 14px;
      }

      .member-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .member h3 {
        margin: 0;
        font-size: 16px;
      }

      .badge {
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
        background: #eef2f6;
        color: var(--ink);
      }

      .badge.good {
        background: #e7f6ee;
        color: var(--green);
      }

      .badge.watch {
        background: #fff5db;
        color: var(--amber);
      }

      .funnel {
        display: grid;
        gap: 8px;
      }

      .step {
        display: grid;
        grid-template-columns: 78px 1fr 42px;
        gap: 8px;
        align-items: center;
        font-size: 13px;
      }

      .bar {
        height: 10px;
        border-radius: 999px;
        background: #edf1f5;
        overflow: hidden;
      }

      .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--blue);
      }

      .step:nth-child(2) .bar span {
        background: var(--amber);
      }

      .step:nth-child(3) .bar span {
        background: var(--green);
      }

      .hint {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .wins {
        color: var(--green);
        font-weight: 800;
      }

      .risk {
        color: var(--red);
        font-weight: 800;
      }

      @media (max-width: 860px) {
        .topbar,
        .grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions {
          justify-content: flex-start;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        th,
        td {
          font-size: 13px;
          padding: 10px 6px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div>
          <h1>営業活動 見える化ダッシュボード</h1>
          <p class="sub">121から商談までの営業活動を、週次・月次で前向きに確認するデモ画面</p>
        </div>
        <div class="actions" aria-label="表示期間">
          <button class="active" type="button" data-period="month">月次</button>
          <button type="button" data-period="week">週次</button>
        </div>
      </div>
    </header>

    <main>
      <div class="wrap">
        <div class="notice">
          これはサンプルデータのデモです。実運用ではGoogleカレンダーの予定タイトル
          `【121】` / `【有効紹介】` / `【ヒアリング】` / `【商談】` から自動集計します。
        </div>

        <section class="metrics" aria-label="チーム合計">
          <div class="metric">
            <span>121</span>
            <strong id="metric-one-to-one">0</strong>
          </div>
          <div class="metric">
            <span>有効紹介</span>
            <strong id="metric-referral">0</strong>
          </div>
          <div class="metric">
            <span>ヒアリング</span>
            <strong id="metric-valid">0</strong>
          </div>
          <div class="metric">
            <span>商談</span>
            <strong id="metric-second">0</strong>
          </div>
        </section>

        <section class="grid">
          <div class="panel">
            <h2>メンバー別サマリー</h2>
            <table>
              <thead>
                <tr>
                  <th>メンバー</th>
                  <th>121</th>
                  <th>有効紹介</th>
                  <th>ヒアリング</th>
                  <th>商談</th>
                  <th>次の目安</th>
                </tr>
              </thead>
              <tbody id="summary-body"></tbody>
            </table>
          </div>

          <div class="panel">
            <h2>本人が確認するファネル</h2>
            <div class="member-list" id="member-list"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="./dashboard-data.js"></script>
    <script>
      const fallbackData = {
        month: [
          { name: "田井さん", oneToOne: 4, referral: 3, valid: 12, second: 6 },
          { name: "脇本さん", oneToOne: 3, referral: 2, valid: 9, second: 5 },
          { name: "湯浅さん", oneToOne: 3, referral: 2, valid: 7, second: 3 },
          { name: "丹司さん", oneToOne: 2, referral: 1, valid: 5, second: 2 }
        ],
        week: [
          { name: "田井さん", oneToOne: 1, referral: 1, valid: 3, second: 2 },
          { name: "脇本さん", oneToOne: 1, referral: 1, valid: 2, second: 1 },
          { name: "湯浅さん", oneToOne: 1, referral: 0, valid: 2, second: 1 },
          { name: "丹司さん", oneToOne: 0, referral: 0, valid: 1, second: 0 }
        ]
      };
      const dashboardData = window.DASHBOARD_DATA?.periods
        ? {
            month: window.DASHBOARD_DATA.periods.month.rows,
            week: window.DASHBOARD_DATA.periods.week.rows
          }
        : fallbackData;

      const periodLabels = {
        month: "今月",
        week: "今週"
      };

      function total(rows, key) {
        return rows.reduce((sum, row) => sum + row[key], 0);
      }

      function nextHint(row, period) {
        if ((row.oneToOne ?? 0) >= 3 && row.referral >= 2) return "良いペース";
        if (period === "week" && row.valid >= 2) return "商談化を確認";
        if ((row.oneToOne ?? 0) < 2) return "121を追加";
        if (row.referral < 1) return "有効紹介を確認";
        if (row.valid < 3) return "ヒアリングを追加";
        if (row.second < 2) return "商談化を確認";
        return "次の接点を確認";
      }

      function achievementBadge(row) {
        return (row.oneToOne ?? 0) >= 3 && row.referral >= 2
          ? '<span class="badge good">目標圏内</span>'
          : '<span class="badge watch">積み上げ中</span>';
      }

      function render(period) {
        const rows = dashboardData[period];
        document.querySelectorAll("button[data-period]").forEach((button) => {
          button.classList.toggle("active", button.dataset.period === period);
        });

        document.getElementById("metric-one-to-one").textContent = total(rows, "oneToOne");
        document.getElementById("metric-referral").textContent = total(rows, "referral");
        document.getElementById("metric-valid").textContent = total(rows, "valid");
        document.getElementById("metric-second").textContent = total(rows, "second");

        document.getElementById("summary-body").innerHTML = rows
          .map(
            (row) => `
              <tr>
                <td>${row.name}</td>
                <td>${row.oneToOne ?? 0}</td>
                <td>${row.referral ?? 0}</td>
                <td>${row.valid}</td>
                <td>${row.second}</td>
                <td>${nextHint(row, period)}</td>
              </tr>
            `
          )
          .join("");

        document.getElementById("member-list").innerHTML = rows
          .map((row) => {
            const max = Math.max(row.valid, 1);
            const secondRate = Math.round((row.second / max) * 100);

            return `
              <article class="member">
                <div class="member-head">
                  <h3>${row.name}</h3>
                  ${achievementBadge(row)}
                </div>
                <div class="funnel" aria-label="${row.name}の${periodLabels[period]}ファネル">
                  <div class="step">
                    <span>ヒアリング</span>
                    <div class="bar"><span style="width: 100%"></span></div>
                    <strong>${row.valid}</strong>
                  </div>
                  <div class="step">
                    <span>商談</span>
                    <div class="bar"><span style="width: ${secondRate}%"></span></div>
                    <strong>${row.second}</strong>
                  </div>
                </div>
                <p class="hint">${nextHint(row, period)}。今の動きを見ながら、次の一手を決めやすくします。</p>
              </article>
            `;
          })
          .join("");
      }

      document.querySelectorAll("button[data-period]").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.period));
      });

      render("month");
    </script>
  </body>
</html>
